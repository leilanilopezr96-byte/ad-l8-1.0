<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width" />
        <title>replit</title>
        <link href="style.css" rel="stylesheet" type="text/css" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
    </head>

    <body>
        <div class="logo container-fluid">
            <div class="container-xxl">
                <div class="row">
                    <div class="col-7 text-center logo-div-img">
                        <img class="logo-img" src="./img/logo.png" />
                    </div>
                    <div class="col-5 logo-div-text">
                      <div class="logo-div-text-text">
                        <h1 class="text-center text-white" style="font-family: cursive;">Tinta Nómada</h1>
                        <p class="lh-1 fs-6 fst-italic text-white-50">"Forjamos tus recuerdos inmortales."</p>
                      </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="row">
                <div class="col-2 ads">
                    <p>aqui van los anuncios, dineros</p>
                </div>
                <div class="col-8">
                    <div class="row contenido1">
                        <!-- Aqui va una seccion del contenido esta dividido para sea facil de juntar-->
                        <!--Edite por aqui-->
                        <h1>Contenido 1</h1>
                    </div>
                    <div class="row contenido2">
                        <!-- Aqui va una seccion del contenido esta dividido para sea facil de juntar-->
                        <!--Edite por aqui-->
                        <h1>Contenido 2</h1>
                    </div>
                </div>
                <div class="col-2 news">
                    <p>aqui van las noticias</p>
                </div>
            </div>
        </div>

        <script src="script.js"></script>

        <!--
  This script places a badge on your repl's full-browser view back to your repl's cover
  page. Try various colors for the theme: dark, light, red, orange, yellow, lime, green,
  teal, blue, blurple, magenta, pink!
  -->
        <script
            src="https://replit.com/public/js/replit-badge-v2.js"
            theme="dark"
            position="bottom-right"
        ></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
